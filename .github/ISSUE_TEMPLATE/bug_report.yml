name: Bug Report
description: Report a bug in LinguaForge
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do you reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Browser (PWA)
        - Desktop - macOS
        - Desktop - Windows
        - Desktop - Linux
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / App version
      placeholder: e.g. Chrome 124, LinguaForge 0.1.0

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else useful.
