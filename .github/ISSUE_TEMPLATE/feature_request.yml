name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? What use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SRS Engine
        - Exercise types
        - Language Pack system
        - Audio / Speech
        - UI / UX
        - Desktop app (Tauri)
        - PWA / Offline
        - Other
