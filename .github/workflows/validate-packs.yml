name: Validate Language Packs

on:
  push:
    paths:
      - 'src/packs/**'
      - 'src/validation/**'
  pull_request:
    paths:
      - 'src/packs/**'
      - 'src/validation/**'

jobs:
  validate:
    name: Validate Language Packs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Japanese pack
        run: npm run validate-pack -- japanese

      - name: Validate English pack
        run: npm run validate-pack -- english
