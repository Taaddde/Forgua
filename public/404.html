<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA fallback — saves the full URL and redirects to index.html
    sessionStorage.redirect = location.href;
    window.location.replace(
      location.protocol + '//' + location.host +
      location.pathname.split('/').slice(0, 2).join('/')
    );
  </script>
</head>
<body></body>
</html>
