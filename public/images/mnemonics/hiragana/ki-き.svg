<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">き</text>
  <!-- Mnemonic: き looks like a key — "KEY" -->
  <!-- Key shaft (vertical, like き vertical stroke) -->
  <line x1="200" y1="65" x2="200" y2="220" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Key bow (top ring) -->
  <circle cx="200" cy="55" r="22" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <!-- Inner hole of key bow -->
  <circle cx="200" cy="55" r="10" stroke="#f59e0b" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Key teeth (horizontal strokes like き) -->
  <line x1="200" y1="130" x2="240" y2="130" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="240" y1="130" x2="240" y2="150" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="200" y1="170" x2="235" y2="170" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="235" y1="170" x2="235" y2="185" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="200" y1="205" x2="225" y2="205" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="225" y1="205" x2="225" y2="218" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Horizontal cross strokes of き -->
  <line x1="145" y1="105" x2="255" y2="105" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <line x1="150" y1="155" x2="250" y2="155" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- Sparkle (key is shiny) -->
  <line x1="140" y1="45" x2="140" y2="65" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <line x1="130" y1="55" x2="150" y2="55" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <!-- Label text -->
  <text x="310" y="100" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">KEY</text>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">き = "ki" — tiene forma de llave (KEY)</text>
</svg>
