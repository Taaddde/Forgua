<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">く</text>
  <!-- Mnemonic: く looks like an open beak — "KU-ckoo" -->
  <!-- Bird head (round) -->
  <circle cx="230" cy="110" r="30" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Eye -->
  <circle cx="240" cy="102" r="5" fill="#e2e8f0"/>
  <!-- Eye shine -->
  <circle cx="242" cy="100" r="2" fill="#0f172a"/>
  <!-- Upper beak (the < shape, top half) -->
  <line x1="200" y1="105" x2="145" y2="140" stroke="#f59e0b" stroke-width="4"/>
  <!-- Lower beak (the < shape, bottom half) -->
  <line x1="200" y1="125" x2="145" y2="140" stroke="#f59e0b" stroke-width="4"/>
  <!-- Bird body -->
  <ellipse cx="260" cy="160" rx="40" ry="50" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Wing -->
  <path d="M 240 140 Q 280 150 290 175" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <path d="M 245 155 Q 275 160 285 180" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <!-- Tail feathers -->
  <line x1="295" y1="170" x2="320" y2="155" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="298" y1="178" x2="325" y2="168" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Feet -->
  <line x1="250" y1="210" x2="245" y2="235" stroke="#e2e8f0" stroke-width="2"/>
  <line x1="270" y1="210" x2="265" y2="235" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Sound bubble -->
  <rect x="85" y="50" width="100" height="35" rx="10" fill="#f59e0b" opacity="0.9"/>
  <text x="135" y="73" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#0f172a">KU-ckoo!</text>
  <!-- Sound lines from beak -->
  <line x1="130" y1="130" x2="110" y2="120" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <line x1="128" y1="140" x2="105" y2="140" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">く = "ku" — un pico de pájaro abierto: "KU-ckoo!"</text>
</svg>
