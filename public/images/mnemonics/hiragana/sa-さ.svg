<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">さ</text>
  <!-- Mnemonic: さ looks like a sail — "SAil" -->
  <!-- Water line -->
  <path d="M 60 210 Q 100 200 140 210 Q 180 220 220 210 Q 260 200 300 210 Q 340 220 370 210"
        stroke="#6366f1" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Boat hull -->
  <path d="M 140 210 L 155 230 L 265 230 L 280 210 Z" stroke="#e2e8f0" stroke-width="2" fill="#e2e8f0" opacity="0.15"/>
  <line x1="140" y1="210" x2="280" y2="210" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Mast (さ vertical stroke) -->
  <line x1="210" y1="60" x2="210" y2="210" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Sail (triangle, like さ shape) -->
  <path d="M 210 65 L 210 185 L 140 185 Z" stroke="#f59e0b" stroke-width="2.5" fill="#f59e0b" opacity="0.2"/>
  <!-- Sail cross-beam (さ horizontal stroke) -->
  <line x1="140" y1="120" x2="260" y2="120" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Boom -->
  <line x1="210" y1="185" x2="140" y2="185" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Flag at top -->
  <path d="M 210 60 L 230 50 L 210 42" stroke="#f59e0b" stroke-width="2" fill="#f59e0b" opacity="0.6"/>
  <!-- Wind lines -->
  <line x1="100" y1="90" x2="125" y2="90" stroke="#e2e8f0" stroke-width="1.5" opacity="0.4"/>
  <line x1="90" y1="110" x2="120" y2="110" stroke="#e2e8f0" stroke-width="1.5" opacity="0.4"/>
  <line x1="95" y1="130" x2="125" y2="130" stroke="#e2e8f0" stroke-width="1.5" opacity="0.4"/>
  <!-- Text -->
  <text x="325" y="100" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#f59e0b">SAil</text>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">さ = "sa" — un velero con su vela (SAil)</text>
</svg>
