<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">し</text>
  <!-- Mnemonic: し looks like a fishing hook — "fiSHIng hook" -->
  <!-- Fishing rod -->
  <line x1="280" y1="30" x2="220" y2="50" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="220" y1="50" x2="200" y2="55" stroke="#e2e8f0" stroke-width="2.5"/>
  <!-- Rod handle -->
  <line x1="280" y1="30" x2="310" y2="20" stroke="#e2e8f0" stroke-width="4"/>
  <!-- Fishing line (vertical, like し) -->
  <line x1="200" y1="55" x2="200" y2="180" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Hook (the し curve at the bottom) -->
  <path d="M 200 180 Q 200 220 220 235 Q 245 250 270 230" stroke="#f59e0b" stroke-width="3.5" fill="none"/>
  <!-- Hook barb -->
  <line x1="270" y1="230" x2="260" y2="218" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Water surface -->
  <path d="M 70 160 Q 110 150 150 160 Q 190 170 230 160 Q 270 150 310 160 Q 340 167 370 160"
        stroke="#6366f1" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Bubbles underwater -->
  <circle cx="230" cy="190" r="4" stroke="#e2e8f0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="240" cy="205" r="3" stroke="#e2e8f0" stroke-width="1.5" fill="none" opacity="0.3"/>
  <circle cx="250" cy="195" r="2" stroke="#e2e8f0" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Fish near hook -->
  <ellipse cx="310" cy="210" rx="22" ry="12" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <path d="M 332 210 L 348 198 L 348 222 Z" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <circle cx="300" cy="207" r="2.5" fill="#e2e8f0"/>
  <!-- Reel on rod -->
  <circle cx="260" cy="42" r="10" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">し = "shi" — un anzuelo de pesca (fiSHIng hook)</text>
</svg>
