<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">あ</text>
  <!-- Mnemonic figure: person with arms extended saying "Ahhh!" -->
  <!-- Head -->
  <circle cx="200" cy="80" r="24" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Body -->
  <line x1="200" y1="104" x2="200" y2="180" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Arms extended (like あ cross stroke) -->
  <line x1="140" y1="130" x2="260" y2="130" stroke="#f59e0b" stroke-width="3"/>
  <!-- Legs -->
  <line x1="200" y1="180" x2="165" y2="230" stroke="#e2e8f0" stroke-width="3"/>
  <line x1="200" y1="180" x2="235" y2="230" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Speech bubble -->
  <rect x="260" y="50" width="100" height="40" rx="12" fill="#f59e0b" opacity="0.9"/>
  <text x="310" y="75" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#0f172a">Ahhh!</text>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">あ = "a" — como una persona con los brazos abiertos</text>
</svg>
