<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">え</text>
  <!-- Mnemonic: え looks like an Energetic dancer -->
  <!-- Head -->
  <circle cx="200" cy="70" r="20" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Body (the え vertical stroke) -->
  <line x1="200" y1="90" x2="200" y2="160" stroke="#e2e8f0" stroke-width="3"/>
  <!-- Top arm extended (え horizontal top stroke) -->
  <line x1="150" y1="105" x2="250" y2="105" stroke="#f59e0b" stroke-width="3"/>
  <!-- Dynamic leg pose (え bottom curve) -->
  <path d="M 200 160 Q 230 190 250 210 Q 260 220 240 230" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <path d="M 200 160 Q 170 190 160 220" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Energy lines -->
  <line x1="270" y1="80" x2="290" y2="70" stroke="#10b981" stroke-width="2"/>
  <line x1="275" y1="95" x2="295" y2="90" stroke="#10b981" stroke-width="2"/>
  <line x1="270" y1="110" x2="290" y2="110" stroke="#10b981" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">え = "e" — un bailarín Enérgico con los brazos abiertos</text>
</svg>
