<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <!-- Hiragana character - large, semi-transparent -->
  <text x="200" y="160" text-anchor="middle" dominant-baseline="central"
        font-family="serif" font-size="180" fill="#6366f1" opacity="0.2">う</text>
  <!-- Mnemonic: "Oooh!" — a face looking up in wonder, like the う curve -->
  <!-- Face outline (the う shape) -->
  <ellipse cx="200" cy="150" rx="50" ry="70" stroke="#e2e8f0" stroke-width="3" fill="none"/>
  <!-- Eyes looking up -->
  <circle cx="185" cy="130" r="6" fill="#e2e8f0"/>
  <circle cx="215" cy="130" r="6" fill="#e2e8f0"/>
  <!-- Mouth open "oo" -->
  <ellipse cx="200" cy="170" rx="12" ry="16" stroke="#f59e0b" stroke-width="2" fill="#f59e0b" opacity="0.3"/>
  <!-- Top dot (the ten-ten position) -->
  <circle cx="200" cy="65" r="5" fill="#f59e0b"/>
  <!-- Wonder lines -->
  <line x1="120" y1="80" x2="130" y2="90" stroke="#f59e0b" stroke-width="2"/>
  <line x1="115" y1="100" x2="128" y2="105" stroke="#f59e0b" stroke-width="2"/>
  <line x1="280" y1="80" x2="270" y2="90" stroke="#f59e0b" stroke-width="2"/>
  <line x1="285" y1="100" x2="272" y2="105" stroke="#f59e0b" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#94a3b8">う = "u" — cara mirando arriba diciendo "Oooh!"</text>
</svg>
